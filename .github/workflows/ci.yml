name: CI

# Every check is one `dagger call` against this repo's module, so CI runs the
# same commands a developer runs — the workflow contributes the runner and the
# fan-out, never a build step of its own. If a leg fails here, reproduce it by
# running the command in its `run:` line locally.
#
#   dagger call templ-check        generated *_templ.go matches the .templ
#   dagger call ci                 the z5labs pipeline: gofmt, go vet, golangci-lint,
#                                  go test -race, multi-arch build — for both binaries
#   dagger call integration-test   the emulator-backed tests, tagged `integration`
#   dagger call image-smoke-test   the scratch image runs and serves on $PORT
#   dagger call terraform validate deploy/ is formatted and the config is valid
#   dagger call deploy             publish the image and roll Cloud Run onto it
#
# The one exception is `codegen`, which is a `dagger develop` rather than a
# `dagger call`: it regenerates .dagger/'s committed client and fails if that
# changed anything. It has to be its own job for that reason, not a matrix leg.
#
# The last one is the only leg that changes anything outside this run, and it
# is fenced accordingly: it runs on a push to main, only after every check
# above is green, and only in this repository — the credential it uses cannot
# be minted anywhere else (deploy/wif.tf).
#
# The checks hold no cloud credential at all. `terraform validate` is in their
# list precisely because it needs none: it initializes with `-backend=false`,
# so it runs on a fork's pull request like every other leg. `plan` and `apply`
# still need one and are still run by hand — provisioning an environment is
# not a thing a push should do.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # Must equal dagger.json's engineVersion — the `pin` job fails the run if it
  # drifts. The CLI provisions the engine of its own version, so a mismatch here
  # silently runs the module against an engine it wasn't generated for.
  DAGGER_VERSION: "0.21.7"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Superseded PR pushes are dead work; main's runs are the record and are kept.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Fail fast on a bad pin, and warm the engine-image cache exactly once. Doing
  # this in one job before the fan-out means a cold cache is a single ~600MB
  # pull, not three simultaneous ones racing to save the same key.
  engine:
    name: Prime Dagger engine
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify DAGGER_VERSION matches dagger.json
        run: |
          set -euo pipefail
          pinned=$(jq -r '.engineVersion' dagger.json)
          if [ "$pinned" != "v${DAGGER_VERSION}" ]; then
            echo "::error::dagger.json pins engineVersion '$pinned' but this workflow pins 'v${DAGGER_VERSION}'." \
                 "Update env.DAGGER_VERSION in .github/workflows/ci.yml to match."
            exit 1
          fi

      # lookup-only: on a hit we only need to know the key exists — the legs
      # each restore the tarball themselves, so downloading it here too would
      # buy nothing.
      - name: Probe engine cache
        id: probe
        uses: actions/cache/restore@v4
        with:
          path: engine.tar.gz
          key: dagger-engine-v${{ env.DAGGER_VERSION }}
          lookup-only: true

      - name: Pull engine image
        if: steps.probe.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          IMAGE="registry.dagger.io/engine:v${DAGGER_VERSION}"
          for i in 1 2 3; do
            timeout 300 docker pull "$IMAGE" && break
            echo "engine pull attempt $i failed/timed out; retrying in 5s" >&2
            sleep 5
          done
          docker image inspect "$IMAGE" >/dev/null   # fail the job if still missing
          docker save "$IMAGE" | gzip > engine.tar.gz

      - name: Save engine cache
        if: steps.probe.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: engine.tar.gz
          key: dagger-engine-v${{ env.DAGGER_VERSION }}

  check:
    name: ${{ matrix.check.name }}
    needs: [engine]
    runs-on: ubuntu-latest
    # The slowest leg (`ci`: lint + race tests + a multi-arch build of both
    # binaries) runs well under this on a cold cache; it's a backstop, not a
    # budget.
    timeout-minutes: 25
    strategy:
      # Every leg reports independently: a lint failure must not hide a broken
      # integration test, or the next push fixes one and discovers the other.
      fail-fast: false
      matrix:
        check:
          - name: templ generate is committed
            call: templ-check
          - name: fmt, vet, lint, test, build
            call: ci
          - name: Firestore integration tests
            call: integration-test
          - name: the image runs and serves
            call: image-smoke-test
          - name: Terraform is formatted and valid
            call: terraform validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Dagger
        uses: ./.github/actions/dagger
        with:
          version: ${{ env.DAGGER_VERSION }}

      - name: dagger call ${{ matrix.check.call }}
        # Optional: with the secret unset this is empty and Dagger simply runs
        # without Cloud telemetry. Set it to get a trace URL for a failed leg.
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
        run: dagger call ${{ matrix.check.call }}

  # .dagger/'s generated client (dagger.gen.go, internal/dagger/) is committed,
  # which is what lets plain Go tooling work in that module on a fresh checkout —
  # it is the only importer of the module's requirements, so without it
  # `go mod tidy` prunes every one of them and empties go.mod. The price of
  # committing it is that it can now go stale, in two ways this job catches
  # equally: a module edit that was never regenerated, and an `engineVersion`
  # bump that was never regenerated against. Both produce output that differs
  # from the checkout, so both fail here.
  codegen:
    name: Dagger's generated client is current
    needs: [engine]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Dagger
        uses: ./.github/actions/dagger
        with:
          version: ${{ env.DAGGER_VERSION }}

      - name: dagger develop
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
        run: dagger develop

      - name: Fail if it wrote anything
        run: |
          set -euo pipefail
          # Staged, not `git diff --exit-code` on the worktree: a plain diff is
          # blind to a file that is entirely new, and adding a module dependency
          # generates exactly that (a new client under internal/dagger/).
          git add -A
          if ! git diff --cached --quiet; then
            echo "::error::.dagger/'s generated client is stale. Run \`dagger develop\` and commit what it writes."
            git diff --cached --stat
            exit 1
          fi

  # Publish this commit's images and roll the Cloud Run service onto the
  # server one. Like every leg above it is a single `dagger call` — the same
  # command you can run by hand against your own project — so there is no
  # CI-only deploy path to drift from the one a human uses:
  #
  #   dagger call deploy --project=<id> \
  #     --access-token=cmd://"gcloud auth print-access-token"
  #
  # `needs: [check, codegen]` is the gate, and it is airtight in a way a
  # separate workflow could not be: this job runs on the very commit the checks
  # passed on, in the same run, from the same checkout.
  #
  # It is also not the only fence. The z5labs pipeline pushes only for a HEAD
  # ref matching ^refs/heads/main$ (.dagger/main.go), so even a job that
  # somehow ran elsewhere would publish nothing; and the token below can only
  # be minted for a workflow in THIS repository (deploy/wif.tf) — a fork's
  # pull request carries a fork's `repository` claim, which the pool rejects.
  deploy:
    name: Publish and deploy to Cloud Run
    needs: [check, codegen]
    # An unset GCP_PROJECT means no environment has been provisioned yet
    # (deploy/README.md) — there is nothing to deploy to, so this is a skip
    # rather than a failure. Set it and the deploy is live; the step below
    # then insists on the other two variables rather than half-deploying.
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && vars.GCP_PROJECT != ''
    runs-on: ubuntu-latest
    # The whole z5labs pipeline again (lint, race tests, a multi-arch build of
    # both binaries), then the push and the rollout. The rollout itself waits
    # for the new revision to pass its startup probe.
    timeout-minutes: 40
    permissions:
      contents: read
      # Mint the OIDC token GCP federates. This is the only job that gets it,
      # and it is the only credential in this workflow: there is no
      # service-account key here or in the repository's secrets.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # These come from `dagger call terraform … output` and are repository
      # *variables*, not secrets: a provider's resource name and a service
      # account's email are addresses, not credentials — the credential is
      # minted per run, below.
      - name: Check the deploy variables are set
        env:
          WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
          DEPLOYER_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          missing=""
          [ -n "$WIF_PROVIDER" ] || missing="${missing} GCP_WIF_PROVIDER"
          [ -n "$DEPLOYER_SERVICE_ACCOUNT" ] || missing="${missing} GCP_DEPLOYER_SERVICE_ACCOUNT"
          if [ -n "$missing" ]; then
            echo "::error::GCP_PROJECT is set, so this repository is meant to deploy — but these repository variables are not:${missing}." \
                 "Every one of them is an output of the Terraform in deploy/; see deploy/README.md."
            exit 1
          fi

      - name: Set up Dagger
        uses: ./.github/actions/dagger
        with:
          version: ${{ env.DAGGER_VERSION }}

      # No key, anywhere. GitHub mints an OIDC token for this run, GCP's
      # workload identity pool exchanges it for an access token good for the
      # hour, and that token is the whole of what the deploy holds. What makes
      # it safe is the pool's attribute condition, which is in deploy/wif.tf.
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          token_format: access_token

      # That one token authenticates both halves of the deploy: the registry
      # takes it as the password for `oauth2accesstoken`, and gcloud reads it
      # from the environment. It reaches Dagger as a Secret (env://), so it is
      # mounted into the execs that need it and is never baked into a layer.
      - name: dagger call deploy
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          GCP_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          GCP_PROJECT: ${{ vars.GCP_PROJECT }}
          # Must be the region deploy/ was applied with; both default to
          # us-central1 (deploy/variables.tf).
          GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
        run: |
          dagger call deploy \
            --project="${GCP_PROJECT}" \
            --region="${GCP_REGION}" \
            --access-token=env://GCP_ACCESS_TOKEN
